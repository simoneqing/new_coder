<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今天吃什么转盘</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #ef4444;
      --accent-dark: #dc2626;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #fff5f5, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(980px, 100%);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
      padding: 24px;
    }

    .wheel-wrap {
      display: grid;
      place-items: center;
      position: relative;
    }

    .pointer {
      position: absolute;
      top: 6px;
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 28px solid var(--accent);
      z-index: 5;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.25));
    }

    #wheel {
      width: 360px;
      height: 360px;
      border-radius: 50%;
      border: 10px solid #fff;
      box-shadow: inset 0 0 0 2px #e5e7eb, 0 8px 24px rgba(0, 0, 0, .12);
      transition: transform 4.6s cubic-bezier(.16,.8,.19,1);
      background: #f3f4f6;
    }

    .controls h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .controls p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font: inherit;
      line-height: 1.5;
    }

    .btns {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform .12s ease, opacity .2s ease, background .2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    #renderBtn { background: #e5e7eb; }
    #spinBtn {
      background: var(--accent);
      color: white;
      font-weight: 700;
    }
    #spinBtn:hover { background: var(--accent-dark); }

    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px dashed #d1d5db;
      min-height: 58px;
      display: flex;
      align-items: center;
    }

    .result strong {
      color: var(--accent-dark);
      font-size: 20px;
      margin-left: 6px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        justify-items: center;
      }
      .controls { width: min(520px, 100%); }
      #wheel { width: 320px; height: 320px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="wheel-wrap">
      <div class="pointer" aria-hidden="true"></div>
      <canvas id="wheel" width="720" height="720" aria-label="菜品转盘"></canvas>
    </section>

    <section class="controls">
      <h1>今天吃什么？</h1>
      <p>每行输入一个菜品，点击“更新转盘”，再点击“开始转动”。</p>
      <textarea id="foodsInput">宫保鸡丁
麻婆豆腐
番茄牛腩
寿司
黄焖鸡
兰州拉面
水煮鱼
沙拉</textarea>
      <div class="btns">
        <button id="renderBtn">更新转盘</button>
        <button id="spinBtn">开始转动</button>
      </div>
      <div class="result" id="result">结果：<strong>等待抽取...</strong></div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const foodsInput = document.getElementById('foodsInput');
    const renderBtn = document.getElementById('renderBtn');
    const spinBtn = document.getElementById('spinBtn');
    const resultBox = document.getElementById('result');

    const palette = ['#FECACA', '#FDE68A', '#BFDBFE', '#C7D2FE', '#A7F3D0', '#FBCFE8', '#FED7AA', '#DDD6FE'];
    let foods = [];
    let spinning = false;
    let currentRotation = 0;

    function parseFoods() {
      const list = foodsInput.value
        .split('\n')
        .map(item => item.trim())
        .filter(Boolean);
      const unique = [...new Set(list)];
      return unique.slice(0, 24);
    }

    function drawWheel() {
      foods = parseFoods();
      if (foods.length < 2) {
        resultBox.innerHTML = '结果：<strong>请至少输入 2 个菜品</strong>';
        return;
      }

      const size = canvas.width;
      const center = size / 2;
      const radius = center - 12;
      const angle = (Math.PI * 2) / foods.length;

      ctx.clearRect(0, 0, size, size);

      for (let i = 0; i < foods.length; i++) {
        const start = i * angle - Math.PI / 2;
        const end = start + angle;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[i % palette.length];
        ctx.fill();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(start + angle / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#111827';
        ctx.font = 'bold 32px "PingFang SC", "Microsoft YaHei", sans-serif';
        ctx.fillText(foods[i], radius - 24, 10);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(center, center, 22, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 2;
      ctx.stroke();
      resultBox.innerHTML = '结果：<strong>等待抽取...</strong>';
    }

    function getResultByRotation(rotationDeg) {
      const segment = 360 / foods.length;
      const normalized = ((rotationDeg % 360) + 360) % 360;
      const adjusted = (360 - normalized + 90) % 360;
      const index = Math.floor(adjusted / segment) % foods.length;
      return foods[index];
    }

    function spin() {
      if (spinning) return;
      if (foods.length < 2) {
        drawWheel();
        return;
      }

      spinning = true;
      spinBtn.disabled = true;

      const fullTurns = Math.floor(Math.random() * 3) + 6;
      const offset = Math.random() * 360;
      const delta = fullTurns * 360 + offset;
      currentRotation += delta;

      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        const picked = getResultByRotation(currentRotation);
        resultBox.innerHTML = `结果：<strong>${picked}</strong>`;
        spinning = false;
        spinBtn.disabled = false;
      }, 4700);
    }

    renderBtn.addEventListener('click', drawWheel);
    spinBtn.addEventListener('click', spin);

    drawWheel();
  </script>
</body>
</html>
